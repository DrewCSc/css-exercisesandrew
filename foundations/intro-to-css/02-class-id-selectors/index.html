<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class and ID Selectors</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <p class="title">Number 1 - I'm a class!</p>
   <h1> <div id="header">Number 2 - I'm one ID.</div></h1>
   <h2> <p class="title special">Number 3 - I'm a class, but cooler!</p></h2>
   <h3> <div id="title">Number 4 - I'm another ID.</div> </h3>
   <h4> <p class="title">Number 5 - I'm a class!</p> </h4>
  </body>
</html>
